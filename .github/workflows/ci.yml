name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install torch (special index)
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install mmcv-full (special build)
        run: CC=clang CXX=clang++ CFLAGS='-stdlib=libc++' MMCV_WITH_OPS=1 pip install mmcv-full==1.7.2 --no-build-isolation

      - name: Install project dependencies
        run: pip install ".[build]"

      - name: Build macOS app
        run: pyinstaller AutoLineDigitizer.spec --noconfirm

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install torch (special index)
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install mmcv-full (special build)
        run: pip install mmcv-full==1.7.2 --no-build-isolation
        env:
          MMCV_WITH_OPS: '1'

      - name: Install project dependencies
        run: pip install ".[build]"

      - name: Build Windows app
        run: pyinstaller AutoLineDigitizer.spec --noconfirm
